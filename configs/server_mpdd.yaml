runtime:
  mode: ${RUN_MODE:-smoke}
  dataset: ${DATASET:-mpdd}
  device: ${DEVICE:-cuda}
  seed: 7
  batch_size: ${BATCH_SIZE:-16}
  output_root: ${OUTPUT_ROOT:-outputs/server_mpdd}
  progress: ${PROGRESS:-true}

model:
  dinomaly_root: ${DINOMALY_ROOT:-third_party/Dinomaly}
  checkpoint_path: ${CHECKPOINT_PATH:-}
  backbone: dinov2reg_vit_base_14
  strict_checkpoint: false

data:
  dataset: ${DATASET:-mpdd}
  root: ${DATA_ROOT}
  categories: ["${MPDD_CATEGORY:-bracket_black}"]
  limit_per_category: 4

base_training:
  train_if_missing: ${BASE_TRAIN_IF_MISSING:-true}
  force_retrain: ${BASE_FORCE_RETRAIN:-false}
  total_iters: ${BASE_TOTAL_ITERS:-10000}
  eval_interval: ${BASE_EVAL_INTERVAL:-5000}
  batch_size: ${BATCH_SIZE:-16}
  num_workers: ${EVAL_NUM_WORKERS:-4}
  checkpoint_dir: ${BASE_CHECKPOINT_DIR:-}

hard_samples:
  search_budget: ${SEARCH_BUDGET:-4}
  max_samples: ${MAX_SAMPLES:-4}
  shard_size: ${HARD_SAMPLE_SHARD_SIZE:-32}
  cache_images: ${CACHE_IMAGES:-false}
  regenerate: ${REGENERATE_HARD_SAMPLES:-false}

enhancer:
  epochs: ${ENHANCER_EPOCHS:-30}
  hidden_dim: ${ENHANCER_HIDDEN_DIM:-256}
  lr: ${ENHANCER_LR:-0.0003}
  retrain: ${RETRAIN_ENHANCER:-false}

evaluation:
  enabled: ${EVAL_ENABLED:-true}
  batch_size: ${EVAL_BATCH_SIZE:-16}
  num_workers: ${EVAL_NUM_WORKERS:-4}
  resize_mask: ${EVAL_RESIZE_MASK:-256}
  limit_per_category: ${EVAL_LIMIT_PER_CATEGORY:-all}
  pixel_metrics: ${EVAL_PIXEL_METRICS:-true}
  pixel_aupro: ${EVAL_PIXEL_AUPRO:-false}
  epoch_pixel_metrics: ${EVAL_EPOCH_PIXEL_METRICS:-false}
  beta: ${EVAL_FUSION_BETA:-0.5}
