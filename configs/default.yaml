project:
  name: llm-das-dinomaly
  route: faithful_transplantation

dinomaly:
  backbone: dinov2reg_vit_base_14
  image_size: 448
  crop_size: 392
  patch_size: 14
  target_layers: [2, 3, 4, 5, 6, 7, 8, 9]
  fuse_layer_encoder: [[0, 1, 2, 3], [4, 5, 6, 7]]
  fuse_layer_decoder: [[0, 1, 2, 3], [4, 5, 6, 7]]
  topk_ratio: 0.01
  gaussian_kernel: 5
  gaussian_sigma: 4.0

synthesis:
  image:
    n_try: 16
    max_per_image: 4
    area_ratio: [0.005, 0.12]
    components: [1, 4]
    max_shift: 12
    blur_kernel: 7
    noise_sigma: 0.08
    color_strength: 0.25
    feather_radius: 7
  feature:
    n_patch: [4, 64]
    mix_alpha: 0.5
    noise_sigma: 0.1

hardness:
  z_target: 2.0
  tau_z: 0.75
  overlap_target: 0.4
  tau_overlap: 0.15
  tau_perturb: 0.03
  keep_z: [1.0, 3.0]
  min_mask_area: 0.005
  max_mask_area: 0.15
  min_overlap: 0.15

enhancer:
  hidden_dim: 128
  num_layers: 2
  dropout: 0.1
  beta_grid: [0.25, 0.5, 1.0, 2.0]
